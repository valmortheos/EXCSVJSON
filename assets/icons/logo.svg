<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Modern Minimalist Logo for EXCSJSON -->
  <rect width="100" height="100" rx="20" fill="#121212" />
  
  <!-- Outer glowing border/frame representing data transfer -->
  <rect x="10" y="10" width="80" height="80" rx="14" stroke="#4CAF50" stroke-width="4" stroke-dasharray="8 4"/>
  
  <!-- Nodes representing Excel, CSV, JSON -->
  <circle cx="30" cy="50" r="8" fill="#4CAF50" />
  <circle cx="50" cy="50" r="8" fill="#4CAF50" />
  <circle cx="70" cy="50" r="8" fill="#4CAF50" />
  
  <!-- Connecting lines -->
  <path d="M38 50 L42 50 M58 50 L62 50" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
  <path d="M40 45 L45 50 L40 55 M60 45 L65 50 L60 55" stroke="#4CAF50" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
